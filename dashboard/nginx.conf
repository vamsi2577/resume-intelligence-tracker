server {
    listen 80;
    server_name localhost;

    # Serve static files from the build output
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # For React Router to work properly if history API is used (i.e. returning index.html for unknown paths)
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Python backend running on port 8000
    location /api/ {
        # 'backend' matches the service name defined in docker-compose.yml
        proxy_pass http://backend:8000;
        
        # Pass standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy health check directly to the backend (prevents index.html fall-through)
    location = /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Error pages
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
