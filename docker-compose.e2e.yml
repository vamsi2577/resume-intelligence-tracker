name: resume-intelligence-tracker-e2e

services:
  postgres-e2e:
    image: postgres:16-alpine
    container_name: rit_postgres_e2e
    restart: unless-stopped
    environment:
      POSTGRES_USER: rit_test_user
      POSTGRES_PASSWORD: rit_test_password
      POSTGRES_DB: resume_intelligence_test
    ports:
      # Expose on 5433 to not conflict with local dev 5432
      - "5433:5432"
    # No persistent volume mapping. The data is destroyed when container stops.
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U rit_test_user -d resume_intelligence_test" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: .
    container_name: rit_backend_e2e
    restart: unless-stopped
    depends_on:
      postgres-e2e:
        condition: service_healthy
    ports:
      # Expose on 8080 to not conflict with local dev 8000
      - "8080:8000"
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://rit_test_user:rit_test_password@postgres-e2e:5432/resume_intelligence_test
      # We could run the migrations and seeds cleanly here
      # using a custom entrypoint or compose command if desired

  seeder:
    build: .
    container_name: rit_seeder_e2e
    depends_on:
      backend:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://rit_test_user:rit_test_password@postgres-e2e:5432/resume_intelligence_test
    command: >-
      sh -c "python -m alembic upgrade head && python -m src.db.seed"
    restart: "no"

  frontend-e2e:
    build: ./dashboard
    container_name: rit_frontend_e2e
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Expose Nginx on 8081
      - "8081:80"
