# ─────────────────────────────────────────────────────────────
# Ephemeral end-to-end test stack.
# Fully isolated from dev: own ports, own DB, own volumes (none).
# Data is destroyed every time the stack stops.
#
#   Postgres  → 5433   (no persistent volume)
#   Backend   → 8080   APP_ENV=e2e
#   Frontend  → 8081
#
# Run:
#   docker compose -f docker-compose.e2e.yml --env-file .env.e2e up -d
# ─────────────────────────────────────────────────────────────
name: rit-e2e

services:
  postgres-e2e:
    image: postgres:16-alpine
    container_name: rit_postgres_e2e
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # 5433 so it never conflicts with the dev stack on 5432.
      - "5433:5432"
    # Intentionally no volume mapping — data destroyed on `down`.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: .
    container_name: rit_backend_e2e
    restart: unless-stopped
    depends_on:
      postgres-e2e:
        condition: service_healthy
    ports:
      - "8080:8000"
    env_file:
      - .env.e2e
    environment:
      APP_ENV: e2e
      # Internal postgres-e2e service port is always 5432 inside the container network.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-e2e:5432/${POSTGRES_DB}

  seeder:
    build: .
    container_name: rit_seeder_e2e
    depends_on:
      backend:
        condition: service_started
    env_file:
      - .env.e2e
    environment:
      APP_ENV: e2e
      # Internal postgres-e2e service port is always 5432 inside the container network.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-e2e:5432/${POSTGRES_DB}
    command: >-
      sh -c "python -m alembic upgrade head && python -m src.db.seed"
    restart: "no"

  frontend-e2e:
    build: ./dashboard
    container_name: rit_frontend_e2e
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"
