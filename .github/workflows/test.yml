name: Tests

on:
  pull_request:
  push:
    branches: [main, staging/test]

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rit_user
          POSTGRES_PASSWORD: ci-postgres-pw
          POSTGRES_DB: rit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rit_user -d rit_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Stack identity — "test" is in VALID_ENVS (src/core/config.py).
      APP_ENV: test
      POSTGRES_USER: rit_user
      POSTGRES_PASSWORD: ci-postgres-pw
      POSTGRES_DB: rit_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      # LLM left unset — JD → résumé tests mock the client; nothing should
      # reach a real provider in CI.
      LLM_API_KEY: ""
      ALLOWED_ORIGINS: '["http://localhost"]'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q
