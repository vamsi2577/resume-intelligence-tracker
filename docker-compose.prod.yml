# ─────────────────────────────────────────────────────────────
# Production stack template.
#
# Use this as a starting point for the deployed environment.
# In a real deploy you'll typically:
#   - point at a managed Postgres (RDS / Cloud SQL / Neon) instead
#     of running one in compose
#   - terminate TLS in front of the backend (nginx / Cloudflare)
#   - put real values in .env.prod (copied from .env.prod.example)
#
# Run:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# ─────────────────────────────────────────────────────────────
name: rit-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: rit_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No host-port exposure in prod — only the backend reaches it
    # across the compose network. Add `ports:` if you need an admin
    # tunnel and lock it down with a firewall.
    volumes:
      - rit_postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: .
    container_name: rit_backend_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      # Internal postgres service port is always 5432 inside the container network.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

  frontend:
    build: ./dashboard
    container_name: rit_frontend_prod
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  rit_postgres_data_prod:
    driver: local
